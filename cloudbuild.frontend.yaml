# Cloud BuildでフロントエンドをビルドしてArtifact Registryへpushする設定です。
# Viteの VITE_API_BASE_URL はビルド時に静的ファイルへ埋め込まれるため、
# Docker build時の --build-arg としてバックエンドURLを渡します。
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_BASE_URL=${_VITE_API_BASE_URL}'
      - '-t'
      - '${_IMAGE}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}'

images:
  - '${_IMAGE}'
